
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marquin na City ULTRA</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial;
    color:white;
}

#map{
    width:2000px;
    height:2000px;
    position:relative;
    background:
        repeating-linear-gradient(0deg,#333 0px,#333 100px,#2a2a2a 100px,#2a2a2a 120px),
        repeating-linear-gradient(90deg,#333 0px,#333 100px,#2a2a2a 100px,#2a2a2a 120px);
}

#car{
    width:60px;
    height:80px;
    position:absolute;
    background-image:url("https://i.imgur.com/6XbK0Qp.png");
    background-size:contain;
    background-repeat:no-repeat;
}

.pedestre{
    width:40px;
    height:60px;
    position:absolute;
    background:orange;
    border-radius:10px;
}

#delivery{
    width:40px;
    height:40px;
    background:yellow;
    position:absolute;
    border-radius:50%;
}

#joystick{
    position:fixed;
    bottom:40px;
    left:30px;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.1);
    border-radius:50%;
    touch-action:none;
}

#stick{
    width:60px;
    height:60px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:30px;
    left:30px;
}

#ui{
    position:fixed;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="ui">
💰 <span id="money">0</span> |
⛽ <span id="fuel">100</span>
</div>

<div id="map">
    <div id="car"></div>
    <div class="pedestre"></div>
    <div class="pedestre"></div>
    <div class="pedestre"></div>
    <div id="delivery"></div>
</div>

<div id="joystick">
    <div id="stick"></div>
</div>

<script>
let car = document.getElementById("car");
let delivery = document.getElementById("delivery");
let pedestres = document.querySelectorAll(".pedestre");

let x=500,y=500;
let money=0;
let fuel=100;

car.style.left=x+"px";
car.style.top=y+"px";

delivery.style.left="1200px";
delivery.style.top="800px";

// espalhar pedestres
pedestres.forEach(p=>{
    p.style.left=Math.random()*1800+"px";
    p.style.top=Math.random()*1800+"px";
});

// mover pedestres
setInterval(()=>{
    pedestres.forEach(p=>{
        let px=parseFloat(p.style.left);
        let py=parseFloat(p.style.top);
        px+=(Math.random()-0.5)*4;
        py+=(Math.random()-0.5)*4;
        p.style.left=px+"px";
        p.style.top=py+"px";
    });
},100);

// joystick
let joystick=document.getElementById("joystick");
let stick=document.getElementById("stick");
let dragging=false;

joystick.addEventListener("touchstart",()=>dragging=true);

joystick.addEventListener("touchend",()=>{
    dragging=false;
    stick.style.left="30px";
    stick.style.top="30px";
});

joystick.addEventListener("touchmove",(e)=>{
    if(!dragging)return;

    let rect=joystick.getBoundingClientRect();
    let touch=e.touches[0];

    let offsetX=touch.clientX-rect.left-60;
    let offsetY=touch.clientY-rect.top-60;

    let distance=Math.sqrt(offsetX*offsetX+offsetY*offsetY);
    let max=40;

    if(distance>max){
        offsetX=offsetX/distance*max;
        offsetY=offsetY/distance*max;
    }

    stick.style.left=(offsetX+30)+"px";
    stick.style.top=(offsetY+30)+"px";

    x+=offsetX*0.1;
    y+=offsetY*0.1;

    fuel-=0.05;
    if(fuel<0)fuel=0;

    car.style.left=x+"px";
    car.style.top=y+"px";

    document.getElementById("fuel").innerText=Math.floor(fuel);

    checkDelivery();
});

function checkDelivery(){
    let dx=parseInt(delivery.style.left);
    let dy=parseInt(delivery.style.top);

    if(Math.abs(dx-x)<40 && Math.abs(dy-y)<40){
        money+=100;
        fuel=100;

        delivery.style.left=Math.random()*1800+"px";
        delivery.style.top=Math.random()*1800+"px";

        document.getElementById("money").innerText=money;
        document.getElementById("fuel").innerText=fuel;
    }
}
</script>

</body>
</html>
